# Drift — single-server bundle.
#
# Everything to run a complete Drift deployment on one Linux box:
#   - Drift control plane (drift-postgres + drift-agent + drift-frontend)
#   - VictoriaMetrics stack (vm, vlogs, vmauth for remote agents,
#     vmalert + alertmanager + alertmanager-ntfy)
#   - Grafana for dashboards
#   - Reporter (vmagent + cadvisor + vector + node-exporter) so this
#     host scrapes its own metrics into the local VM
#   - Caddy (OPTIONAL — only with `--profile caddy`) for public TLS
#
# Port-binding convention: every web-facing service binds to
# 127.0.0.1:<port>:<port>. That lets an external reverse proxy on the
# same host (your existing Caddy / Traefik / nginx) front everything,
# OR the bundled Caddy (opt-in profile) take over with no port
# conflicts. Nothing public-facing is exposed without an explicit
# reverse proxy.
#
# Start:
#   ./install.sh                       # interactive bootstrap; picks
#                                       # whether to use bundled Caddy
#
# Or by hand:
#   docker compose up -d                          # without bundled Caddy
#   docker compose --profile caddy up -d          # with bundled Caddy

# Fixed project name + container names so `docker ps` is the same
# wherever the operator cloned the repo (the default project name is
# derived from the parent directory, which would yield e.g.
# `deploy-vm-1` for a fresh clone in `~/drift/deploy/`).
name: drift

services:
  # ------------------------------------------------------------------
  # Caddy — OPTIONAL. Opt-in with `--profile caddy`. When disabled,
  # drift-frontend / vmalert / alertmanager / grafana / vmauth are
  # reachable on 127.0.0.1:<port> for the operator's existing reverse
  # proxy to forward to.
  # ------------------------------------------------------------------
  caddy:
    image: caddy:2
    container_name: drift-caddy
    restart: unless-stopped
    profiles: [caddy]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      WEB_AUTH_USER: ${WEB_AUTH_USER:-drift}
      WEB_AUTH_HASH: ${WEB_AUTH_HASH:-}
    networks: [drift]
    depends_on:
      - drift-frontend
      - vmalert
      - alertmanager
      - grafana
      - vmauth

  # ------------------------------------------------------------------
  # VictoriaMetrics — time-series database
  # ------------------------------------------------------------------
  vm:
    image: victoriametrics/victoria-metrics:latest
    container_name: drift-vm
    restart: unless-stopped
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=${VM_RETENTION:-90d}"
    volumes:
      - vm-data:/victoria-metrics-data
    networks: [drift]

  # ------------------------------------------------------------------
  # VictoriaLogs — log database
  # ------------------------------------------------------------------
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: drift-victorialogs
    restart: unless-stopped
    command:
      - "-storageDataPath=/victoria-logs-data"
      - "-retentionPeriod=${VL_RETENTION:-30d}"
    volumes:
      - vl-data:/victoria-logs-data
    networks: [drift]

  # ------------------------------------------------------------------
  # vmauth — gateway for remote vmagents pushing metrics + logs.
  # Exposed on 127.0.0.1 so the host's reverse proxy (bundled Caddy or
  # external) can front it. Remote agents hit it via that proxy.
  # ------------------------------------------------------------------
  vmauth:
    image: victoriametrics/vmauth:latest
    container_name: drift-vmauth
    restart: unless-stopped
    command:
      - "--auth.config=/etc/auth.yml"
    volumes:
      - ./config/auth.yml:/etc/auth.yml:ro
    # Host port only added in external-proxy mode via
    # docker-compose.external.yml — in bundled-Caddy mode the
    # in-network Caddy reaches us via DNS, no host port needed.
    networks: [drift]

  # ------------------------------------------------------------------
  # vmalert — alert rule evaluation
  # ------------------------------------------------------------------
  vmalert:
    image: victoriametrics/vmalert:latest
    container_name: drift-vmalert
    restart: unless-stopped
    depends_on: [vm, alertmanager]
    command:
      - "--datasource.url=http://vm:8428"
      - "--remoteWrite.url=http://vm:8428"
      - "--remoteRead.url=http://vm:8428"
      - "--notifier.url=http://alertmanager:9093/am"
      - "--rule=/etc/alerts/*.yml"
      - "--evaluationInterval=30s"
      - "--external.url=${PUBLIC_URL:-http://localhost}/vmalert"
      - "--http.pathPrefix=/vmalert"
    volumes:
      - ./config/alerts:/etc/alerts:rw
    # See docker-compose.external.yml for the host-port binding.
    networks: [drift]

  # ------------------------------------------------------------------
  # Alertmanager — alert routing + silencing
  # ------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: drift-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=${PUBLIC_URL:-http://localhost}/am"
    volumes:
      # Directory bind so atomic file replaces by drift-agent are visible
      # to alertmanager without a container restart.
      - ./config/alertmanager:/etc/alertmanager:rw
      - ./config/alertmanager-secrets:/etc/alertmanager/secrets:ro
      - alertmanager-data:/alertmanager
    # See docker-compose.external.yml for the host-port binding.
    networks: [drift]

  # ------------------------------------------------------------------
  # alertmanager-ntfy — AM webhook → ntfy.sh translator
  # ------------------------------------------------------------------
  alertmanager-ntfy:
    image: ghcr.io/alexbakker/alertmanager-ntfy:latest
    container_name: drift-alertmanager-ntfy
    restart: unless-stopped
    command:
      - "--configs=/etc/alertmanager-ntfy/config.yml"
    volumes:
      - ./config/alertmanager-ntfy.yml:/etc/alertmanager-ntfy/config.yml:ro
    networks: [drift]

  # ------------------------------------------------------------------
  # Grafana — dashboards
  # ------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:latest
    container_name: drift-grafana
    restart: unless-stopped
    depends_on: [vm]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana.ini:/etc/grafana/grafana.ini:ro
    # See docker-compose.external.yml for the host-port binding.
    networks: [drift]

  # ------------------------------------------------------------------
  # drift-postgres — control plane state
  # ------------------------------------------------------------------
  drift-postgres:
    image: postgres:16-alpine
    container_name: drift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DRIFT_PG_USER:-drift}
      POSTGRES_PASSWORD: ${DRIFT_PG_PASSWORD:?set DRIFT_PG_PASSWORD in .env}
      POSTGRES_DB: ${DRIFT_PG_DB:-drift}
    volumes:
      - drift-pg-data:/var/lib/postgresql/data
    networks: [drift]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # drift-agent — FastAPI backend
  # ------------------------------------------------------------------
  drift-agent:
    image: ghcr.io/kidproquo/drift-agent:latest
    container_name: drift-agent
    restart: unless-stopped
    depends_on:
      drift-postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Local services — internal docker DNS.
      VM_URL: http://vm:8428
      VL_URL: http://victorialogs:9428
      VMALERT_URL: http://vmalert:8880/vmalert
      ALERTMANAGER_URL: http://alertmanager:9093/am
      ALLOWED_ORIGINS: ${PUBLIC_URL:-http://localhost}
      DRIFT_PG_URL: postgresql+asyncpg://${DRIFT_PG_USER:-drift}:${DRIFT_PG_PASSWORD}@drift-postgres:5432/${DRIFT_PG_DB:-drift}
      # Local-storage bundle backend by default; flip to s3 + fill the
      # B2_* env vars to push bundles to an external bucket.
      BUNDLE_STORAGE: ${BUNDLE_STORAGE:-local}
      BUNDLE_STORAGE_PATH: /var/lib/drift/bundles
      VMALERT_RULES_DIR: /etc/alerts
      ALERTMANAGER_CONFIG_FILE: /etc/alertmanager/alertmanager.yml
      ALERTMANAGER_SECRETS_DIR: /etc/alertmanager/secrets
    volumes:
      - ./config/alerts:/etc/alerts:rw
      - ./config/alertmanager:/etc/alertmanager:rw
      - ./config/alertmanager-secrets:/etc/alertmanager/secrets:ro
      - drift-bundles:/var/lib/drift/bundles
    networks: [drift]

  # ------------------------------------------------------------------
  # drift-frontend — React SPA + nginx /api proxy to drift-agent
  # ------------------------------------------------------------------
  drift-frontend:
    image: ghcr.io/kidproquo/drift-frontend:latest
    container_name: drift-frontend
    restart: unless-stopped
    depends_on: [drift-agent]
    # See docker-compose.external.yml for the host-port binding.
    networks: [drift]
    # Override the image's baked-in healthcheck: it uses busybox wget
    # against http://localhost/, which resolves to ::1 first; nginx
    # listens on 0.0.0.0:80 only (no IPv6 bind), so wget gets
    # "connection refused" even though the service is healthy. Pin
    # the loopback to 127.0.0.1.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ==================================================================
  # Reporter — this host scrapes its own metrics into local VM
  # ==================================================================
  reporter-vmagent:
    image: victoriametrics/vmagent:latest
    container_name: drift-reporter-vmagent
    restart: unless-stopped
    depends_on: [vm, victorialogs]
    hostname: ${REPORTER_HOSTNAME:-drift-host}
    environment:
      HOSTNAME: ${REPORTER_HOSTNAME:-drift-host}
      GROUP_ID: ${REPORTER_GROUP:-cloud}
    volumes:
      - ./config/reporter/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-promscrape.config.strictParse=false"
      - "-remoteWrite.url=http://vm:8428/api/v1/write"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [drift]

  reporter-cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: drift-reporter-cadvisor
    restart: unless-stopped
    command:
      - "-housekeeping_interval=10s"
      - "-docker_only=true"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [drift]

  reporter-vector:
    image: timberio/vector:0.43.0-alpine
    container_name: drift-reporter-vector
    restart: unless-stopped
    hostname: vector-${REPORTER_HOSTNAME:-drift-host}
    environment:
      VECTOR_CONFIG: /etc/vector/vector.yaml
      VECTOR_DATA_DIR: /var/lib/vector
    volumes:
      - ./config/reporter/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - vector-data:/var/lib/vector
    networks: [drift]

  reporter-node-exporter:
    image: prom/node-exporter:latest
    container_name: drift-reporter-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|cgroup|cgroup2|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
      - /var/lib/node_exporter/textfile_collector:/var/lib/node_exporter/textfile_collector:ro

volumes:
  caddy-data:
  caddy-config:
  vm-data:
  vl-data:
  grafana-data:
  drift-pg-data:
  drift-bundles:
  alertmanager-data:
  vector-data:

networks:
  drift:
    driver: bridge
