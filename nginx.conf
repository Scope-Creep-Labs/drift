# Tunnel subdomain server block. Matched FIRST by hostname (anything
# starting with `tunnel-`), so requests to tunnel-<token>.<base>/... get
# proxied to drift-agent's TunnelProxyMiddleware regardless of path.
# The `_` server block below is the catchall for all other Host headers
# (the SPA + /api/*); nginx picks the most specific match by name.
#
# Same upstream port + Upgrade/Connection plumbing as the terminal
# location so WebSocket upgrades work end-to-end. Long timeouts so a
# tab the operator left open doesn't get reaped at 60s.
server {
    listen 80;
    server_name ~^tunnel-;

    location / {
        proxy_pass         http://drift-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering     off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long-lived cache (Vite emits hashed filenames).
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Agent SSE endpoint: disable buffering, hold the connection open for long agent runs.
    location /api/investigate {
        proxy_pass         http://drift-agent:8000/investigate;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        chunked_transfer_encoding on;
    }

    # Terminal WebSocket endpoints (both browser and agent sides). Same
    # upstream as the rest of /api/, but with Upgrade/Connection headers
    # so nginx forwards the HTTP-101 handshake to FastAPI cleanly, and
    # long read/send timeouts so an idle terminal isn't reaped after
    # the default 60s. Auth lives on the FastAPI side (cookie for the
    # browser path, bearer for the agent path).
    location ~ ^/api/deploy/(agent/terminal/ws|devices/[^/]+/terminal/ws) {
        proxy_pass         http://drift-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Other API routes (healthz, deploy admin + agent). No trailing slash on
    # proxy_pass so the full URI is preserved end-to-end — drift-agent's
    # FastAPI routers are mounted at /api/deploy/*, so stripping /api/
    # here would 404 every deploy call.
    location /api/ {
        proxy_pass         http://drift-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback — every unmatched path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
