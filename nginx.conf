server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long-lived cache (Vite emits hashed filenames).
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Agent SSE endpoint: disable buffering, hold the connection open for long agent runs.
    location /api/investigate {
        proxy_pass         http://drift-agent:8000/investigate;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        chunked_transfer_encoding on;
    }

    # Other API routes (healthz, future endpoints).
    location /api/ {
        proxy_pass         http://drift-agent:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback — every unmatched path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
