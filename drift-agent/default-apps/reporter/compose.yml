services:
  vmagent:
    container_name: vmagent
    hostname: vmagent-${DRIFT_DEVICE_NAME}
    image: victoriametrics/vmagent:latest
    environment:
      HOSTNAME: ${DRIFT_DEVICE_NAME}
      GROUP_ID: ${DRIFT_GROUP_ID}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - vmagent-data:/vmagent-remotewrite-data
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-promscrape.config.strictParse=false"
      - "-remoteWrite.url=${DRIFT_CP_PUBLIC_URL}/vm/api/v1/write"
      - "-remoteWrite.basicAuth.username=${DRIFT_VM_WRITE_USER}"
      - "-remoteWrite.basicAuth.password=${DRIFT_VM_WRITE_PASSWORD}"
      - "-remoteWrite.tmpDataPath=/vmagent-remotewrite-data"
      - "-remoteWrite.maxDiskUsagePerURL=500MB"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cadvisor
      - node-exporter
      - vector
      - process-exporter

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    command:
      - "-housekeeping_interval=10s"
      - "-docker_only=true"
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      # ${DRIFT_DOCKER_DATA_DIR} resolves to /var/lib/docker on vanilla
      # Linux and /volume1/@docker on Synology. The agent auto-detects
      # the host's docker root at install time via `docker info`.
      - ${DRIFT_DOCKER_DATA_DIR:-/var/lib/docker}:/var/lib/docker:ro

  vector:
    image: timberio/vector:0.43.0-alpine
    container_name: vector
    hostname: vector-${DRIFT_DEVICE_NAME}
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - vector-data:/var/lib/vector
    environment:
      VECTOR_CONFIG: /etc/vector/vector.yaml
      VECTOR_DATA_DIR: /var/lib/vector
      # Pass through the edge-agent's bridged vars so vector.yaml's
      # ${VAR} interpolation resolves (the YAML is mounted, not
      # compose-interpolated, so vector reads from its own env).
      DRIFT_DEVICE_NAME: ${DRIFT_DEVICE_NAME}
      DRIFT_GROUP_ID: ${DRIFT_GROUP_ID}
      DRIFT_CP_PUBLIC_URL: ${DRIFT_CP_PUBLIC_URL}
      DRIFT_VM_WRITE_USER: ${DRIFT_VM_WRITE_USER}
      DRIFT_VM_WRITE_PASSWORD: ${DRIFT_VM_WRITE_PASSWORD}
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    network_mode: host
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|cgroup|cgroup2|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
      # cpufreq collector reads /sys/.../cpufreq/stats/trans_table which
      # is "file too large" on NVIDIA Jetson and some other ARM SoCs
      # (the kernel exposes a giant frequency-transition matrix). The
      # collector blows up the whole scrape on those hosts. Disable it
      # everywhere; per-CPU frequency is rarely a load-bearing signal
      # in app monitoring, and basic load/usage still come from the
      # `cpu` collector which is unaffected.
      - "--no-collector.cpufreq"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
      - /var/lib/node_exporter/textfile_collector:/var/lib/node_exporter/textfile_collector:ro
    restart: unless-stopped

  process-exporter:
    image: ncabatoff/process-exporter:latest
    container_name: process-exporter
    pid: host
    command:
      - "--procfs=/host/proc"
      - "--config.path=/config/process-exporter.yml"
    volumes:
      - /proc:/host/proc:ro
      - ./process-exporter.yml:/config/process-exporter.yml:ro
    restart: unless-stopped

volumes:
  vector-data:
  vmagent-data:
