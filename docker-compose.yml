# Drift — agentic observability platform
#
# `up` brings up the agent backend + frontend. Both expect a
# Prometheus-compatible time-series source at $VM_URL.
#
#   docker compose up --build
#
# Required env vars in .env:
#   ANTHROPIC_API_KEY=sk-ant-...
#   VM_URL=...                   # e.g. http://your-victoriametrics:8428
#
# All compose-managed services run on the `drift` bridge network.

services:
  drift-postgres:
    image: postgres:16-alpine
    container_name: drift-postgres
    environment:
      POSTGRES_USER: ${DRIFT_PG_USER:-drift}
      POSTGRES_PASSWORD: ${DRIFT_PG_PASSWORD:?set DRIFT_PG_PASSWORD in .env}
      POSTGRES_DB: ${DRIFT_PG_DB:-drift}
    volumes:
      - drift-pg-data:/var/lib/postgresql/data
    networks: [drift]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  drift-agent:
    build:
      context: ./drift-agent
    image: drift-agent:latest
    env_file: .env
    depends_on:
      drift-postgres:
        condition: service_healthy
    environment:
      VM_URL: ${VM_URL}
      VM_TENANT_PATH: ${VM_TENANT_PATH:-}
      VM_BASIC_AUTH: ${VM_BASIC_AUTH:-}
      VM_BEARER_TOKEN: ${VM_BEARER_TOKEN:-}
      VMALERT_URL: ${VMALERT_URL:-}
      VMALERT_BASIC_AUTH: ${VMALERT_BASIC_AUTH:-}
      ALERTMANAGER_URL: ${ALERTMANAGER_URL:-}
      ALERTMANAGER_BASIC_AUTH: ${ALERTMANAGER_BASIC_AUTH:-}
      MODEL: ${MODEL:-claude-opus-4-7}
      EFFORT: ${EFFORT:-high}
      MAX_TOKENS: ${MAX_TOKENS:-64000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:10001,http://127.0.0.1:10001,https://drift.example.com}
      VMALERT_RULES_DIR: ${VMALERT_RULES_DIR:-/etc/alerts}
      ALERTMANAGER_CONFIG_FILE: ${ALERTMANAGER_CONFIG_FILE:-/etc/alertmanager/alertmanager.yml}
      ALERTMANAGER_SECRETS_DIR: ${ALERTMANAGER_SECRETS_DIR:-/etc/alertmanager/secrets}
      # Deploy subsystem (Drift Deploy). Postgres for the control plane;
      # B2 for compose-bundle storage. All optional — when DRIFT_PG_URL is
      # unset the deploy module stays dormant and existing tools keep working.
      DRIFT_PG_URL: ${DRIFT_PG_URL:-postgresql+asyncpg://drift:${DRIFT_PG_PASSWORD}@drift-postgres:5432/drift}
      B2_ENDPOINT: ${B2_ENDPOINT:-}
      B2_REGION: ${B2_REGION:-}
      B2_ACCESS_KEY_ID: ${B2_ACCESS_KEY_ID:-}
      B2_SECRET_ACCESS_KEY: ${B2_SECRET_ACCESS_KEY:-}
      B2_BUCKET: ${B2_BUCKET:-}
      B2_PREFIX: ${B2_PREFIX:-drift-bundles}
    ports:
      - "8000:8000"
    # Bind-mount the vmalert rule dir so the agent can write
    # `drift-managed.yml` and trigger a reload. Set VMALERT_RULES_HOST_DIR
    # in .env to the path on the docker host (default points at the local
    # VM stack at /root/setup/victoria/alerts).
    #
    # Also mount alertmanager.yml (rw) + the AM secrets dir (ro) so the
    # agent can manage receivers/routes via webhook references — but never
    # see the secret contents themselves.
    volumes:
      - ${VMALERT_RULES_HOST_DIR:-/root/setup/victoria/alerts}:/etc/alerts:rw
      - ${ALERTMANAGER_CONFIG_HOST_FILE:-/root/setup/victoria/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:rw
      - ${ALERTMANAGER_SECRETS_HOST_DIR:-/root/setup/victoria/am-secrets}:/etc/alertmanager/secrets:ro
    networks: [drift]
    restart: unless-stopped

  drift-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ENGINE: agent
        # Served at https://drift.example.com/drift/ behind Caddy.
        # Use '/' for root-served deployments.
        VITE_BASE: /drift/
    image: drift-frontend:latest
    depends_on:
      - drift-agent
    ports:
      - "10001:80"
    networks: [drift]
    restart: unless-stopped

volumes:
  drift-pg-data:

networks:
  drift:
    driver: bridge
