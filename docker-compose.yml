# Drift — agentic observability platform
#
# `up` brings up the agent backend + frontend. Both expect a
# Prometheus-compatible time-series source at $VM_URL.
#
#   docker compose up --build
#
# Required env vars in .env:
#   ANTHROPIC_API_KEY=sk-ant-...
#   VM_URL=...                   # e.g. http://your-victoriametrics:8428
#
# All compose-managed services run on the `drift` bridge network.

services:
  drift-agent:
    build:
      context: ./drift-agent
    image: drift-agent:latest
    env_file: .env
    environment:
      VM_URL: ${VM_URL}
      VM_TENANT_PATH: ${VM_TENANT_PATH:-}
      VM_BASIC_AUTH: ${VM_BASIC_AUTH:-}
      VM_BEARER_TOKEN: ${VM_BEARER_TOKEN:-}
      MODEL: ${MODEL:-claude-opus-4-7}
      EFFORT: ${EFFORT:-high}
      MAX_TOKENS: ${MAX_TOKENS:-64000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:10001,http://127.0.0.1:10001,https://drift.example.com}
    ports:
      - "8000:8000"
    networks: [drift]
    restart: unless-stopped

  drift-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ENGINE: agent
        # Served at https://drift.example.com/drift/ behind Caddy.
        # Use '/' for root-served deployments.
        VITE_BASE: /drift/
    image: drift-frontend:latest
    depends_on:
      - drift-agent
    ports:
      - "10001:80"
    networks: [drift]
    restart: unless-stopped

networks:
  drift:
    driver: bridge
