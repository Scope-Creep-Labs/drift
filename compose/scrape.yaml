global:
  scrape_interval: 15s
  external_labels:
    source: drift-demo

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: compose-host

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: compose-host

  - job_name: victoriametrics
    static_configs:
      - targets: ["victoriametrics:8428"]
        labels:
          instance: victoriametrics
